name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @road-rules/api exec prisma generate

      - name: Lint API
        run: pnpm --filter @road-rules/api run lint

      - name: Lint Web
        run: pnpm --filter @road-rules/web run lint

      - name: Typecheck API
        run: pnpm --filter @road-rules/api exec tsc --noEmit

  test-api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: road_rules_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/road_rules_test?schema=public
      JWT_SECRET: ci-test-jwt-secret
      JWT_REFRESH_SECRET: ci-test-jwt-refresh-secret
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @road-rules/api exec prisma generate

      - name: Run migrations
        run: pnpm --filter @road-rules/api exec prisma migrate deploy

      - name: Seed test data
        run: pnpm --filter @road-rules/api exec prisma db seed

      - name: Unit tests
        run: pnpm --filter @road-rules/api run test

      - name: E2E tests
        run: pnpm --filter @road-rules/api run test:e2e

  build:
    if: always()
    needs: [lint-and-typecheck, test-api]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @road-rules/api exec prisma generate

      - name: Build all packages
        run: pnpm run build

  deploy-api:
    if: always() && github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Render
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK_URL" ]; then
            curl -s "$RENDER_DEPLOY_HOOK_URL"
            echo "Deploy triggered"
          else
            echo "RENDER_DEPLOY_HOOK_URL not set, skipping deploy"
          fi
