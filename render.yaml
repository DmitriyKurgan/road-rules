databases:
  - name: road-rules-db
    plan: free
    databaseName: road_rules
    user: road_rules_user

services:
  - type: web
    name: road-rules-api
    plan: free
    runtime: node
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @road-rules/shared run build && pnpm --filter @road-rules/api exec prisma generate && pnpm --filter @road-rules/api run build && pnpm --filter @road-rules/api exec prisma migrate deploy && pnpm --filter @road-rules/api exec prisma db seed
    startCommand: node apps/api/dist/src/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: road-rules-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRY
        value: 15m
      - key: JWT_REFRESH_EXPIRY
        value: 7d
      - key: CORS_ORIGIN
        value: https://dmitriykurgan.github.io
